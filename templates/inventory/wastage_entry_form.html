<!-- templates/inventory/wastage_entry_form.html -->
{% extends 'base/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Record Wastage{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-trash-alt"></i> Record Wastage / Damage</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-danger">Record Wastage</button>
                    <a href="{% url 'inventory:wastage_entry_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
