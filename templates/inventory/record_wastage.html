<!-- templates/inventory/record_wastage.html -->
{% extends 'base/base.html' %}
{% block title %}Record Wastage{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="fas fa-trash-alt"></i> Record Wastage</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Raw Material</label>
                        <select name="raw_material" class="form-select" required>
                            <option value="">Select Material</option>
                            {% for material in materials %}
                            <option value="{{ material.id }}">{{ material.name }} (Stock: {{ material.current_stock }} {{ material.unit }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-control" step="0.001" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Reason</label>
                        <select name="reason" class="form-select" required>
                            <option value="expired">Expired</option>
                            <option value="damaged">Damaged</option>
                            <option value="spoilage">Spoilage</option>
                            <option value="cooking_loss">Cooking Loss</option>
                            <option value="theft">Theft</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">
                        <i class="fas fa-trash-alt"></i> Record Wastage
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
