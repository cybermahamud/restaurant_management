<!-- templates/inventory/adjustment_request_form.html -->
{% extends 'base/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Request Stock Adjustment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h5 class="mb-0"><i class="fas fa-balance-scale"></i> Request Stock Adjustment</h5>
            </div>
            <div class="card-body">
                <p class="text-muted">Use this form to request correction of stock levels (e.g., counting errors).</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-warning">Submit Request</button>
                    <a href="{% url 'inventory:adjustment_request_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
