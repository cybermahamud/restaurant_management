<!-- templates/inventory/invoice_generate.html -->
{% extends 'base/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Generate Invoice{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-file-invoice"></i> Generate Billing Invoice</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary">Generate Invoice</button>
                    <a href="{% url 'inventory:invoice_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
