<!-- templates/inventory/inventory_form.html -->
{% extends 'base/base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white"><h4 class="mb-0"><i class="fas fa-warehouse"></i> {{ title }}</h4></div>
            <div class="card-body">
                <form method="post">{% csrf_token %}{{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save"></i> Save</button>
                    <a href="{% url 'inventory:inventory_list' %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
