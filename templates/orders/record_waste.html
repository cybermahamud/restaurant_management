<!-- templates/orders/record_waste.html -->
{% extends 'base/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Record Waste{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="fas fa-trash-alt"></i> Record Wastage</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-3">
                        <button type="submit" class="btn btn-warning w-100">
                            <i class="fas fa-save"></i> Record Waste
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
